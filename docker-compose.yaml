name: Ticketing System

services:
  booking-db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: booking-db
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password@1990
    ports:
      - "1433:1433"

    volumes:
      - booking-db-data:/var/opt/mssql

volumes:
  booking-db-data:
